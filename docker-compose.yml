version: '3.8'

services:
  # Reverse Proxy / SSL Termination
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /mnt/ebs/certs:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - backend
      - frontend

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2512}
      POSTGRES_DB: ${POSTGRES_DB:-land_marketplace}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - /mnt/ebs/postgres/data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-land_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 2g
    cpus: 2
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=1310kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2

  # Backend API Service
  backend:
    build:
      context: ../RE-Backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-real-estate-backend:latest}
    container_name: backend-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-2512}@postgres:5432/${POSTGRES_DB:-land_marketplace}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-LandMarket}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL:-}
      AGENT_LISTING_LIMIT: ${AGENT_LISTING_LIMIT:-10}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_DOCS_BUCKET: ${S3_DOCS_BUCKET:-}
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL:-}
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: 1

  # Frontend UI Service
  frontend:
    build:
      context: ../RE-FrontEnd
      dockerfile: Dockerfile
      args:
        # Passed at build time so NEXT_PUBLIC_* values are baked into the client bundle
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:5000}
    image: ${FRONTEND_IMAGE:-real-estate-frontend:latest}
    container_name: frontend-app
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:5000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    networks:
      - frontend
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: 1

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  cert_data:
